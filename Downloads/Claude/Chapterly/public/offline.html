<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapterly — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fdf8f3;
      color: #1a1208;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid #e8e0d4;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b5e4d; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #ee7a1e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #d96d17; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1>You&rsquo;re offline</h1>
    <p>No internet connection right now. Your reading data is safe — come back online to sync your progress.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
